<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="job-form">
        <h1>Job Application Form</h1>

        <form>
            <label for="name">Full Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter your name">

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email">

            <label for="position">Position:</label>
            <option>
                <select>Developer</select>
                <select>Designer</select>
                <select>Manager</select>
            </option>

            <fieldset>
                <legend>Availabilty:</legend>
                <input type="radio" name="type" value="Full-Time">
                <label>Full-Time</label>
                <input type="radio" name="type" value="Part-Time">
                <label>Part-Time</label>
            </fieldset>

             <label for="message">Why do you want this job?:</label>
            <textarea placeholder="write your motivation"></textarea>

            <button id="btn">Submit Application</button>
        </form>
    </div>
</body>
</html>
