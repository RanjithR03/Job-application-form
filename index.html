<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="job-form">
        <header>
        <h1>Job Application Form</h1>
        </header>
        <form>
            <label for="name">Full Name:</label>
            <input type="text" name="name" id="name" placeholder="Enter your name" required>

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Enter your email" required>

            <label for="position">Position:</label>
            <select required>
                <option>Developer</option>
                <option>Designer</option>
                <option>Manager</option>
            </select>

            <fieldset>
                <legend>Availabilty:</legend>
                <input type="radio" name="type" value="Full-Time">
                <label>Full-Time</label>
                <input type="radio" name="type" value="Part-Time">
                <label>Part-Time</label>
            </fieldset>

             <label for="message">Why do you want this job?</label>
            <textarea placeholder="write your motivation" required></textarea>

            <button id="btn">Submit Application</button>
        </form>
    </div>
</body>
</html>
